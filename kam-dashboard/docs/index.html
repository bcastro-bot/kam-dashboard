<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAM Dashboard — Apprecio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  /* Paleta Apprecio */
  --primary:#FA345E;        /* Rojo coral principal */
  --primary-l:#FFE6E8;      /* Rosa claro */
  --lavender:#B2A8E7;       /* Lavanda */
  --lavender-l:#EEEAF9;     /* Lavanda claro */
  --teal-a:#45C1AD;         /* Teal secundario */
  --teal-l:#E0F8F5;         /* Teal claro */
  --blue-a:#146787;         /* Azul petróleo */
  --blue-l:#E0F0F5;         /* Azul claro */
  --green-a:#97E89F;        /* Verde menta */
  --green-l:#D7FAB6;        /* Verde lima */

  /* Semánticos → mapeados a paleta Apprecio */
  --bg:#FFFFFF;
  --bg2:#FAF9FB;
  --bg3:#F5F3F9;
  --txt:#1B1B1B;
  --txt2:#4A4A5A;
  --txt3:#9090A0;
  --border:rgba(27,27,27,.12);
  --radius:10px;

  --blue:#146787;
  --blue-l:#E0F0F5;
  --blue-d:#0D4D66;

  --green:#2E7D32;
  --green-l:#D7FAB6;

  --amber:#B86A00;
  --amber-l:#FFF3E0;

  --red:#FA345E;
  --red-l:#FFE6E8;

  --teal:#45C1AD;
  --teal-l:#E0F8F5;

  --forecast:#B2A8E7;
  --forecast-l:#EEEAF9;
  --forecast-b:#B2A8E7;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1B1B1B;
  --bg2:#242430;
  --bg3:#1A1A24;
  --txt:#FFFFFF;
  --txt2:#B2A8E7;
  --txt3:#6060A0;
  --border:rgba(178,168,231,.15);
  --blue:#45C1AD;
  --blue-l:#0D3D4A;
  --blue-d:#45C1AD;
  --green:#97E89F;
  --green-l:#1A3A1A;
  --amber:#FFB74D;
  --amber-l:#3A2800;
  --red:#FA345E;
  --red-l:#3A0A14;
  --teal:#45C1AD;
  --teal-l:#0A2E2A;
  --forecast:#B2A8E7;
  --forecast-l:#1E1A3A;
  --forecast-b:#4A3F8A;
}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg3);color:var(--txt);font-size:14px}
#login-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg3);display:flex;align-items:center;justify-content:center;z-index:9999}
.header{background:var(--bg);border-bottom:.5px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:10px;flex-wrap:wrap}
.header h1{font-size:15px;font-weight:500}
.meta{font-size:11px;color:var(--txt3)}
.main{max-width:1240px;margin:0 auto;padding:18px 14px}
.tabs{display:flex;border-bottom:.5px solid var(--border);margin-bottom:18px;overflow-x:auto}
.tab{padding:8px 16px;font-size:12px;background:none;border:none;border-bottom:2px solid transparent;color:var(--txt2);cursor:pointer;white-space:nowrap;font-family:inherit}
.tab.on{color:var(--primary);border-bottom-color:var(--primary);font-weight:500}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:18px}
.kpi{background:var(--bg);border-radius:var(--radius);padding:11px 13px;border:.5px solid var(--border)}
.kl{font-size:11px;color:var(--txt2);margin-bottom:3px}
.kv{font-size:21px;font-weight:500}
.ks{font-size:10px;color:var(--txt3);margin-top:2px}
.card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius);padding:14px}
.ct{font-size:11px;font-weight:500;color:var(--txt2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
@media(max-width:600px){.g2{grid-template-columns:1fr}}
.pill{display:inline-block;font-size:10px;padding:2px 8px;border-radius:8px;font-weight:500;white-space:nowrap}
.p-activo{background:var(--green-l);color:var(--green)}
.p-nuevo{background:var(--teal-l);color:var(--teal)}
.p-riesgo{background:var(--amber-l);color:var(--amber)}
.p-churn{background:var(--red-l);color:var(--red)}
.btn{font-size:11px;padding:4px 11px;border-radius:8px;border:.5px solid var(--border);background:none;color:var(--txt2);cursor:pointer;font-family:inherit}
.btn.on{background:var(--bg2);color:var(--txt);font-weight:500}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{font-size:10px;font-weight:500;color:var(--txt3);text-transform:uppercase;padding:7px 8px;text-align:right;white-space:nowrap;cursor:pointer;user-select:none;border-bottom:.5px solid var(--border);background:var(--bg2)}
th:hover,th.sorted{color:var(--txt)}
th.left{text-align:left}
td{font-size:12px;padding:8px;border-bottom:.5px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
.mini-bar{height:3px;border-radius:1px;background:#b2a8e7;margin-top:3px}
.srch{position:relative}
.srch input{width:100%;padding:7px 10px 7px 30px;font-size:12px;border:.5px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--txt);font-family:inherit}
.srch svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--txt3);pointer-events:none}
.pct-pill{font-size:11px;font-weight:500;padding:2px 7px;border-radius:8px}
.forecast-badge{background:var(--forecast-l);color:var(--forecast);font-size:10px;padding:1px 6px;border-radius:6px;font-weight:500}
.legend{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--txt2);margin-bottom:6px}
.ld{width:10px;height:3px;border-radius:1px;display:inline-block}
.note{font-size:11px;color:var(--txt3);margin-top:8px}
.forecast-box{background:var(--forecast-l);border:.5px solid var(--forecast-b);border-radius:var(--radius);padding:12px 14px}
.forecast-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:.5px solid var(--forecast-b)}
.forecast-row:last-child{border-bottom:none}
#loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--txt3)}
#error-box{display:none;padding:16px;background:var(--red-l);color:var(--red);border-radius:var(--radius);margin:16px 0}
select{font-size:11px;padding:4px 8px;border:.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--txt);font-family:inherit}
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div style="background:var(--bg);border-radius:20px;padding:44px 40px;width:100%;max-width:380px;box-shadow:0 16px 48px rgba(250,52,94,.12),0 2px 8px rgba(0,0,0,.08)">
    <div style="text-align:center;margin-bottom:32px">
      <div style="display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;background:#FA345E;border-radius:16px;margin-bottom:16px">
        <span style="font-size:24px">◆</span>
      </div>
      <div style="font-size:20px;font-weight:600;color:#1B1B1B">KAM Dashboard</div>
      <div style="font-size:13px;color:#B2A8E7;margin-top:6px;font-weight:500">Apprecio · DCanje</div>
      <div style="font-size:11px;color:var(--txt3);margin-top:2px">Acceso restringido</div>
    </div>
    <div style="margin-bottom:16px">
      <div style="font-size:11px;color:var(--txt2);margin-bottom:6px;font-weight:500">CONTRASEÑA</div>
      <input type="password" id="pwd-input" placeholder="Ingresa tu contraseña"
        style="width:100%;padding:10px 14px;font-size:14px;border:.5px solid var(--border);border-radius:10px;background:var(--bg);color:var(--txt);font-family:inherit;outline:none"
        onkeydown="if(event.key==='Enter')checkLogin()">
    </div>
    <div id="login-error" style="display:none;font-size:12px;color:var(--red);margin-bottom:12px;padding:8px 12px;background:var(--red-l);border-radius:8px">
      Contraseña incorrecta. Intenta nuevamente.
    </div>
    <button onclick="checkLogin()"
      style="width:100%;padding:11px;font-size:14px;font-weight:500;background:#146787;color:#fff;border:none;border-radius:10px;cursor:pointer;font-family:inherit">
      Ingresar
    </button>
    <div style="text-align:center;margin-top:16px;font-size:11px;color:var(--txt3)">Solo para uso interno</div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app-wrapper" style="display:none">
  <div class="header">
    <div>
      <h1 style="display:flex;align-items:center;gap:8px"><span style="color:#FA345E;font-size:18px">◆</span> KAM Dashboard <span style="color:#B2A8E7;font-weight:400">· Apprecio</span></h1>
      <div class="meta" id="last-update">Cargando...</div>
    </div>
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
      <select id="kam-select" onchange="setKAM()" style="font-size:12px;padding:4px 8px;border:.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--txt);font-weight:500">
        <option value="">Cargando...</option>
      </select>
      <select id="period-select" onchange="setPeriod()">
        <option value="mensual">Mes a mes (YoY)</option>
        <option value="trimestral">Trimestral (YoY)</option>
        <option value="ytd">YTD acumulado</option>
      </select>
    </div>
  </div>
  <div class="main">
    <div id="loading">⏳ Cargando datos...</div>
    <div id="error-box"></div>
    <div id="app" style="display:none">
      <div class="kpis" id="kpis"></div>
      <div class="tabs">
        <button class="tab" onclick="showTab('equipo')">🏢 Equipo</button>
        <button class="tab on" onclick="showTab('cartera')">Cartera</button>
        <button class="tab" onclick="showTab('clientes')">Por cliente</button>
        <button class="tab" onclick="showTab('forecast')">Forecast 2026</button>
        <button class="tab" onclick="showTab('activos')">Clientes por mes</button>
        <button class="tab" onclick="showTab('tabla')">Tabla completa</button>
      </div>
      <div id="pane-equipo" style="display:none"></div>
      <div id="pane-cartera"></div>
      <div id="pane-clientes" style="display:none"></div>
      <div id="pane-forecast" style="display:none"></div>
      <div id="pane-activos" style="display:none"></div>
      <div id="pane-tabla" style="display:none"></div>
    </div>
  </div>
</div>

<script>
// ── Login ──────────────────────────────────────────────────────────────────
const CORRECT_PWD = 'apprecio2026';

function checkLogin(){
  const pwd = document.getElementById('pwd-input').value;
  if(pwd === CORRECT_PWD){
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-wrapper').style.display = 'block';
    sessionStorage.setItem('kam_auth','1');
    loadData();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('pwd-input').value = '';
    document.getElementById('pwd-input').focus();
  }
}

// Si ya autenticó en esta sesión, saltar login
if(sessionStorage.getItem('kam_auth') === '1'){
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-wrapper').style.display = 'block';
}

// ── Estado ─────────────────────────────────────────────────────────────────
let FULL_DATA=null,DATA=null,curKAM=null,curPeriod='mensual',curTab='cartera',curClient=null;
let tblFilter='all',tblSort='total',tblAsc=false;
let charts={};

const fmt=v=>{if(!v||v===0)return'—';if(v>=1e9)return'$'+(v/1e9).toFixed(1)+'B';if(v>=1e6)return'$'+(v/1e6).toFixed(1)+'M';if(v>=1e3)return'$'+(v/1e3).toFixed(0)+'K';return'$'+Math.round(v).toLocaleString('es-CL')};
const fmtF=v=>'$'+Math.round(v||0).toLocaleString('es-CL');
const fmtP=v=>v===null||v===undefined?'s/d':(v>=0?'+':'')+v.toFixed(1)+'%';
const pCol=v=>v===null?'var(--txt3)':v>=20?'var(--green)':v>=-10?'var(--blue)':v>=-30?'var(--amber)':'var(--red)';
const pBg=v=>v===null?'transparent':v>=20?'var(--green-l)':v>=-10?'var(--blue-l)':v>=-30?'var(--amber-l)':'var(--red-l)';
const fmtM=m=>{if(!m)return'—';const[y,mo]=m.split('-');const n=['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];return n[+mo]+' '+y.slice(2)};
const kc=id=>{if(charts[id]){charts[id].destroy();delete charts[id]}};

// ── Carga ──────────────────────────────────────────────────────────────────
async function loadData(){
  try{
    const r=await fetch('data.json?v='+Date.now());
    if(!r.ok) throw new Error('No se pudo cargar data.json ('+r.status+')');
    FULL_DATA=await r.json();
    const sel=document.getElementById('kam-select');
    sel.innerHTML=FULL_DATA.kams.map(k=>`<option value="${k}">${k} — ${Object.keys(FULL_DATA[k].clients||{}).length} clientes</option>`).join('');
    curKAM=FULL_DATA.kams.includes('BC')?'BC':FULL_DATA.kams[0];
    sel.value=curKAM;
    setKAM(false);
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('last-update').textContent='Actualizado: '+(FULL_DATA.generated_at||'—');
  }catch(e){
    document.getElementById('loading').style.display='none';
    const eb=document.getElementById('error-box');
    eb.style.display='block';
    eb.textContent='❌ '+e.message;
  }
}

function setKAM(rebuild=true){
  const sel=document.getElementById('kam-select');
  curKAM=sel?sel.value:curKAM;
  DATA=FULL_DATA[curKAM];
  curClient=DATA&&DATA.clients?Object.keys(DATA.clients)[0]:null;
  if(rebuild){renderKPIs();showTab(curTab);}
  else{renderKPIs();showTab('cartera');}
}

function setPeriod(){
  curPeriod=document.getElementById('period-select').value;
  renderKPIs();
  if(curTab==='cartera')buildCartera();
  else if(curTab==='clientes')buildCliente();
}

function showTab(t){
  curTab=t;
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',['equipo','cartera','clientes','forecast','activos','tabla'][i]===t));
  ['equipo','cartera','clientes','forecast','activos','tabla'].forEach(id=>document.getElementById('pane-'+id).style.display=id===t?'block':'none');
  if(t==='equipo')buildEquipo();
  else if(t==='cartera')buildCartera();
  else if(t==='clientes')buildCliente();
  else if(t==='forecast')buildForecast();
  else if(t==='activos')buildActivos();
  else buildTabla();
}

function renderKPIs(){
  const C=DATA.cartera;
  const cv=Object.values(DATA.clients);
  const counts={activo:0,nuevo:0,'en riesgo':0,churn:0};
  cv.forEach(c=>counts[c.status]=(counts[c.status]||0)+1);
  const firstLabel=DATA.month_labels[0]||'Ene 25';
  const lastLabel=DATA.month_labels[DATA.hist_count-1]||'—';
  document.getElementById('kpis').innerHTML=`
    <div class="kpi"><div class="kl">Revenue histórico</div><div class="kv">${fmt(C.total)}</div><div class="ks">${firstLabel} – ${lastLabel}</div></div>
    <div class="kpi"><div class="kl">YTD vs 2025</div><div class="kv" style="color:${pCol(C.ytd_pct)}">${fmtP(C.ytd_pct)}</div><div class="ks">${fmt(C.ytd25)} → ${fmt(C.ytd26)}</div></div>
    <div class="kpi" style="background:var(--forecast-l)"><div class="kl" style="color:var(--forecast)">Forecast H2 2026</div><div class="kv" style="color:var(--forecast)">${fmt(C.forecast_total)}</div><div class="ks" style="color:var(--forecast)">H2 2025 × 1.35</div></div>
    <div class="kpi" style="background:var(--green-l)"><div class="kl" style="color:var(--green)">Activos + nuevos</div><div class="kv" style="color:var(--green)">${counts.activo+counts.nuevo}</div><div class="ks" style="color:var(--green)">${Math.round((counts.activo+counts.nuevo)/cv.length*100)}% cartera</div></div>
    <div class="kpi" style="background:var(--amber-l)"><div class="kl" style="color:var(--amber)">En riesgo</div><div class="kv" style="color:var(--amber)">${counts['en riesgo']}</div><div class="ks" style="color:var(--amber)">90–180 días sin compra</div></div>
    <div class="kpi" style="background:var(--red-l)"><div class="kl" style="color:var(--red)">Churn</div><div class="kv" style="color:var(--red)">${counts.churn}</div><div class="ks" style="color:var(--red)">Sin compra en 2026</div></div>`;
}

function getPD(d){
  if(curPeriod==='mensual')return d.mensual||[];
  if(curPeriod==='trimestral')return d.trimestral||[];
  return[{lbl:'Ene–May 25',v25:d.ytd25,v26:null,pct:null},{lbl:'YTD 2026',v25:null,v26:d.ytd26,pct:d.ytd_pct}];
}
function compCard(d){
  const pd=getPD(d);let html='';
  pd.forEach(p=>{
    if(curPeriod==='ytd'){
      if(p.v25)html+=rowC('Período base 2025',fmtF(p.v25),'var(--txt2)');
      if(p.v26)html+=rowC('YTD 2026',fmtF(p.v26),'var(--txt)');
      if(p.pct!==null&&p.pct!==undefined)html+=rowC('Variación',fmtP(p.pct),pCol(p.pct));
    }else if(p.v25!==null||p.v26!==null){
      const pill=p.pct!==null?`<span class="pct-pill" style="background:${pBg(p.pct)};color:${pCol(p.pct)}">${fmtP(p.pct)}</span>`:'<span style="color:var(--txt3)">s/d</span>';
      html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:.5px solid var(--border)">
        <span style="font-size:12px;color:var(--txt2)">${p.lbl}</span>
        <div style="display:flex;align-items:center;gap:8px"><span style="font-size:11px;color:var(--txt3)">${fmt(p.v25||0)} → ${fmt(p.v26||0)}</span>${pill}</div></div>`;
    }
  });
  return html||'<div style="color:var(--txt3);font-size:12px;padding:8px 0">Sin datos para este período</div>';
}
function rowC(l,v,c){return`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:.5px solid var(--border)"><span style="font-size:12px;color:var(--txt2)">${l}</span><span style="font-size:13px;font-weight:500;color:${c}">${v}</span></div>`}
function chartColors(n,hc){return Array.from({length:n},(_,i)=>i<5?'#B2A8E7':i<hc?'#146787':'rgba(250,52,94,0.75)');}

function buildCartera(){
  kc('c1');kc('c2');
  const C=DATA.cartera;const hc=DATA.hist_count||17;
  const labels=DATA.month_labels||DATA.months;
  const pd=getPD(C).filter(p=>p.v25&&p.v26);
  document.getElementById('pane-cartera').innerHTML=`
    <div class="g2">
      <div class="card"><div class="ct">Comparación período equivalente</div>${compCard(C)}</div>
      <div class="card"><div class="ct">2025 vs 2026</div>
        <div class="legend"><span><span class="ld" style="background:#B2A8E7"></span>2025</span><span><span class="ld" style="background:#146787"></span>2026</span></div>
        <div style="position:relative;height:170px"><canvas id="c2"></canvas></div></div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:6px">
        <div class="ct" style="margin:0">Historial + Forecast</div>
        <span class="forecast-badge">* Forecast = mismo mes 2025 × 1.35</span>
      </div>
      <div class="legend">
        <span><span class="ld" style="background:#B2A8E7"></span>2025</span>
        <span><span class="ld" style="background:#146787"></span>2026 real</span>
        <span><span class="ld" style="background:rgba(250,52,94,0.75)"></span>2026 forecast</span>
      </div>
      <div style="position:relative;height:210px"><canvas id="c1"></canvas></div>
    </div>`;
  requestAnimationFrame(()=>{
    const opts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmtF(c.raw)}}},scales:{x:{ticks:{autoSkip:true,maxTicksLimit:12,font:{size:9}},grid:{display:false}},y:{ticks:{callback:v=>fmt(v),font:{size:9}},grid:{color:'rgba(128,128,128,.06)'}}}};
    const ctx1=document.getElementById('c1');
    if(ctx1)charts.c1=new Chart(ctx1,{type:'bar',data:{labels,datasets:[{data:C.vals,backgroundColor:chartColors(C.vals.length,hc),borderRadius:3}]},options:opts});
    if(pd.length){const ctx2=document.getElementById('c2');
      if(ctx2)charts.c2=new Chart(ctx2,{type:'bar',data:{labels:pd.map(p=>p.lbl),datasets:[
        {label:'2025',data:pd.map(p=>p.v25||0),backgroundColor:'#B2A8E7',borderRadius:3},
        {label:'2026',data:pd.map(p=>p.v26||0),backgroundColor:'#146787',borderRadius:3}
      ]},options:opts});}
  });
}

function buildCliente(){
  kc('cli1');
  const d=DATA.clients[curClient];if(!d)return;
  const hc=d.hist_count||DATA.hist_count||17;
  const labels=DATA.month_labels||DATA.months;
  const sCfg={activo:'p-activo',nuevo:'p-nuevo','en riesgo':'p-riesgo',churn:'p-churn'};
  const sLbl={activo:'Activo',nuevo:'Nuevo','en riesgo':'En riesgo',churn:'Churn'};
  const FM=DATA.forecast_months.map(m=>DATA.month_labels[DATA.months.indexOf(m)]||m);
  const fv=d.forecast_vals||[];
  let fcHtml=d.forecast_has_data

function buildEquipo(){
  const kams=FULL_DATA.kams;
  // Solo KAMs con datos relevantes
  const kamsMain=kams.filter(k=>FULL_DATA[k].cartera.total>1000000);
  const totalRev=kamsMain.reduce((s,k)=>s+FULL_DATA[k].cartera.total,0);
  const totalClientes=kamsMain.reduce((s,k)=>s+Object.keys(FULL_DATA[k].clients).length,0);
  const totalFc=kamsMain.reduce((s,k)=>s+FULL_DATA[k].cartera.forecast_total,0);
  const totalYtd25=kamsMain.reduce((s,k)=>s+(FULL_DATA[k].cartera.ytd25||0),0);
  const totalYtd26=kamsMain.reduce((s,k)=>s+(FULL_DATA[k].cartera.ytd26||0),0);
  const teamYtdPct=totalYtd25>0?((totalYtd26-totalYtd25)/totalYtd25*100).toFixed(1):null;

  // Conteo global de estados
  const counts={activo:0,nuevo:0,'en riesgo':0,churn:0};
  kamsMain.forEach(k=>Object.values(FULL_DATA[k].clients).forEach(c=>counts[c.status]=(counts[c.status]||0)+1));

  // Tabla ranking KAMs
  const kamRows=kamsMain.map(k=>{
    const d=FULL_DATA[k];
    const cl=Object.values(d.clients);
    const cnt={activo:0,nuevo:0,'en riesgo':0,churn:0};
    cl.forEach(c=>cnt[c.status]=(cnt[c.status]||0)+1);
    const share=totalRev>0?(d.cartera.total/totalRev*100).toFixed(1):0;
    return{kam:k,total:d.cartera.total,clientes:cl.length,ytd_pct:d.cartera.ytd_pct,fc:d.cartera.forecast_total,share,cnt};
  }).sort((a,b)=>b.total-a.total);

  // Meses comunes para gráfico equipo
  const months=FULL_DATA[kamsMain[0]].months;
  const labels=FULL_DATA[kamsMain[0]].month_labels;
  const hc=FULL_DATA[kamsMain[0]].hist_count;
  const teamVals=months.map((_,i)=>kamsMain.reduce((s,k)=>{
    const v=FULL_DATA[k].cartera.vals[i]||0; return s+v;
  },0));

  // Colores por KAM
  const kamColors={'BC':'#FA345E','BG':'#146787','LJ':'#45C1AD','CF':'#B2A8E7','AA':'#97E89F','DA':'#FFE6E8','SC':'#D7FAB6','EC':'#1B1B1B','SG':'#888'};

  document.getElementById('pane-equipo').innerHTML=`
    <div class="kpis" style="margin-bottom:18px">
      <div class="kpi"><div class="kl">Revenue total equipo</div><div class="kv">${fmt(totalRev)}</div><div class="ks">Todos los KAMs</div></div>
      <div class="kpi"><div class="kl">YTD equipo vs 2025</div><div class="kv" style="color:${pCol(parseFloat(teamYtdPct))}">${teamYtdPct!==null?(parseFloat(teamYtdPct)>=0?'+':'')+teamYtdPct+'%':'s/d'}</div><div class="ks">${fmt(totalYtd25)} → ${fmt(totalYtd26)}</div></div>
      <div class="kpi" style="background:var(--forecast-l)"><div class="kl" style="color:var(--forecast)">Forecast H2 2026 equipo</div><div class="kv" style="color:var(--forecast)">${fmt(totalFc)}</div><div class="ks" style="color:var(--forecast)">H2 2025 × 1.35</div></div>
      <div class="kpi"><div class="kl">Total clientes equipo</div><div class="kv">${totalClientes}</div><div class="ks">${kamsMain.length} KAMs activos</div></div>
      <div class="kpi" style="background:var(--green-l)"><div class="kl" style="color:var(--green)">Activos + nuevos</div><div class="kv" style="color:var(--green)">${counts.activo+counts.nuevo}</div><div class="ks" style="color:var(--green)">${Math.round((counts.activo+counts.nuevo)/totalClientes*100)}% cartera global</div></div>
      <div class="kpi" style="background:var(--red-l)"><div class="kl" style="color:var(--red)">Churn equipo</div><div class="kv" style="color:var(--red)">${counts.churn}</div><div class="ks" style="color:var(--red)">sin compra en 2026</div></div>
    </div>

    <div class="g2" style="margin-bottom:12px">
      <div class="card">
        <div class="ct">Ranking KAMs — revenue histórico</div>
        <div class="tbl-wrap">
          <table>
            <colgroup><col style="width:28px"><col style="width:48px"><col style="min-width:120px"><col style="width:72px"><col style="width:55px"><col style="width:72px"><col style="width:60px"><col style="width:72px"></colgroup>
            <thead><tr>
              <th class="left">#</th>
              <th class="left">KAM</th>
              <th class="left">Distribución</th>
              <th>Revenue</th>
              <th>Share</th>
              <th>YTD vs 25</th>
              <th>Clientes</th>
              <th style="color:var(--forecast)">Forecast H2</th>
            </tr></thead>
            <tbody>
              ${kamRows.map((r,i)=>{
                const bw=Math.round(r.total/kamRows[0].total*100);
                const col=kamColors[r.kam]||'#888';
                return`<tr style="cursor:pointer" onclick="document.getElementById('kam-select').value='${r.kam}';setKAM();showTab('cartera')">
                  <td style="text-align:center;color:var(--txt3);font-size:11px">${i+1}</td>
                  <td><span style="font-size:12px;font-weight:600;padding:2px 8px;border-radius:6px;background:${col}22;color:${col}">${r.kam}</span></td>
                  <td><div style="background:var(--bg3);border-radius:3px;height:6px"><div style="width:${bw}%;background:${col};height:6px;border-radius:3px"></div></div></td>
                  <td style="text-align:right;font-weight:500">${fmt(r.total)}</td>
                  <td style="text-align:right;color:var(--txt3)">${r.share}%</td>
                  <td style="text-align:right">${r.ytd_pct!==null?`<span class="pct-pill" style="background:${pBg(r.ytd_pct)};color:${pCol(r.ytd_pct)}">${fmtP(r.ytd_pct)}</span>`:'<span style="color:var(--txt3)">s/d</span>'}</td>
                  <td style="text-align:right;color:var(--txt2)">${r.clientes}</td>
                  <td style="text-align:right;color:var(--forecast);font-weight:500">${r.fc>0?fmt(r.fc):'—'}</td>
                </tr>`;
              }).join('')}
              <tr style="background:var(--bg2);border-top:1.5px solid var(--border)">
                <td></td>
                <td style="font-size:11px;font-weight:600">TOTAL</td>
                <td></td>
                <td style="text-align:right;font-weight:600">${fmt(totalRev)}</td>
                <td style="text-align:right;font-weight:600">100%</td>
                <td style="text-align:right">${teamYtdPct!==null?`<span class="pct-pill" style="background:${pBg(parseFloat(teamYtdPct))};color:${pCol(parseFloat(teamYtdPct))};font-weight:600">${parseFloat(teamYtdPct)>=0?'+':''}${teamYtdPct}%</span>`:'—'}</td>
                <td style="text-align:right;font-weight:600">${totalClientes}</td>
                <td style="text-align:right;font-weight:600;color:var(--forecast)">${fmt(totalFc)}</td>
              </tr>
            </tbody>
          </table>
        </div>
        <p class="note" style="margin-top:8px">Clic en cualquier KAM para ver su cartera detallada</p>
      </div>
      <div class="card">
        <div class="ct">Distribución revenue por KAM</div>
        <div style="position:relative;height:240px"><canvas id="eq-pie"></canvas></div>
      </div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:6px">
        <div class="ct" style="margin:0">Revenue equipo — acumulado mensual</div>
        <span class="forecast-badge">* Forecast = H2 2025 × 1.35</span>
      </div>
      <div class="legend">
        ${kamsMain.map(k=>`<span><span class="ld" style="background:${kamColors[k]||'#888'}"></span>${k}</span>`).join('')}
      </div>
      <div style="position:relative;height:220px"><canvas id="eq-bar"></canvas></div>
    </div>`;

  requestAnimationFrame(()=>{
    // Gráfico pie
    const ctxP=document.getElementById('eq-pie');
    if(ctxP){
      if(charts['eq-pie']){charts['eq-pie'].destroy();}
      charts['eq-pie']=new Chart(ctxP,{type:'doughnut',data:{
        labels:kamRows.map(r=>r.kam),
        datasets:[{data:kamRows.map(r=>r.total),backgroundColor:kamRows.map(r=>kamColors[r.kam]||'#888'),borderWidth:2,borderColor:'var(--bg)'}]
      },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:11},boxWidth:12}},tooltip:{callbacks:{label:c=>` ${c.label}: ${fmt(c.raw)} (${(c.raw/totalRev*100).toFixed(1)}%)`}}}}});
    }

    // Gráfico barras apiladas
    const ctxB=document.getElementById('eq-bar');
    if(ctxB){
      if(charts['eq-bar']){charts['eq-bar'].destroy();}
      charts['eq-bar']=new Chart(ctxB,{type:'bar',data:{
        labels,
        datasets:kamsMain.map(k=>({
          label:k,
          data:FULL_DATA[k].cartera.vals,
          backgroundColor:months.map((_,i)=>i>=hc?(kamColors[k]||'#888')+'66':(kamColors[k]||'#888')),
          stack:'s'
        }))
      },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${fmt(c.raw)}`}}},scales:{x:{stacked:true,ticks:{autoSkip:true,maxTicksLimit:12,font:{size:9}},grid:{display:false}},y:{stacked:true,ticks:{callback:v=>fmt(v),font:{size:9}},grid:{color:'rgba(128,128,128,.06)'}}}}});
    }
  });
}

// Arranque
if(sessionStorage.getItem('kam_auth')==='1') loadData();
</script>
</body>
</html>
